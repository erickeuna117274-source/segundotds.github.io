<?php
// CONFIGURAÇÃO DE SEGURANÇA
$sua_senha = "tds2026"; // Mude esta senha para a que você quiser
$arquivo_dados = "avisos.txt";

// Lógica para salvar novo aviso
if (isset($_POST['adicionar']) && $_POST['senha'] === $sua_senha) {
    $data = $_POST['data'];
    $titulo = $_POST['titulo'];
    $desc = $_POST['desc'];
    $semana = $_POST['semana']; // "atual" ou "proxima"

    $novo_aviso = $data . "|" . $titulo . "|" . $desc . "|" . $semana . PHP_EOL;
    file_put_contents($arquivo_dados, $novo_aviso, FILE_APPEND);
    header("Location: index.php"); // Recarrega a página para limpar o formulário
}
